<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Birds Today</title>
  <link rel="stylesheet" href="vendor/leaflet/leaflet.css" />
  <!-- Playfair Display: a Didone revival of the Bodoni/Didot types popular in
       1860-1900 book printing; used for the species names under each bird. -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&display=swap" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="bar">
    <h1>Birds&nbsp;Today</h1>
    <div class="seg" id="mode">
      <button data-mode="A" class="on">Residents</button>
      <button data-mode="B">Migration</button>
    </div>
    <div class="seg" id="src" title="Image source">
      <button data-src="gould" class="on">Gould</button>
      <button data-src="dresser">Dresser</button>
      <button data-src="ai">AI</button>
    </div>
    <span class="spacer"></span>
    <button class="meta loc" id="place" title="Choose a location on the map">📍 —</button>
    <select id="lang" title="Species name language"></select>
  </div>

  <div id="stage"></div>
  <div class="hint" id="hint">Loading birds…</div>
  <div class="tip" id="tip"></div>
  <div id="status"></div>
  <a id="birders" href="https://pcmoan70.github.io/migration_calendar/"
     target="_blank" rel="noopener"
     title="A data-driven companion for serious birders">
    Keen birdwatcher? Try the Migration Calendar for detailed arrival &amp;
    occurrence charts →
  </a>

  <div id="map-modal" class="modal" hidden>
    <div class="modal-box">
      <div class="modal-head">
        <span>Click the map to choose a location</span>
        <button id="map-close" title="Close">✕</button>
      </div>
      <div id="map"></div>
    </div>
  </div>

  <!-- EmailJS SDK (feedback). Configure keys in feedback.js -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script src="vendor/leaflet/leaflet.js"></script>
  <script src="feedback.js"></script>
  <script src="layout.js"></script>
  <script src="app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("sw.js").catch(function () {});
      });
    }
  </script>
</body>
</html>
